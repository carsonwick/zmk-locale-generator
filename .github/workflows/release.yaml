name: Release

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.x

      - name: install dependencies
        run: |
          git submodule update --init --recursive
          pip3 install .
      - name: build
        run: zmk_locale_generator all

      - name: upload
        uses: actions/upload-artifact@v4
        with:
          name: locale
          path: out/**/*.h
